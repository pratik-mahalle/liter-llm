[e2e]
fixtures = "fixtures"
output = "e2e"

# Default call config (used when fixture has no "call" field)
[e2e.call]
function = "chat"
path = "/v1/chat/completions"
module = "liter_llm"
result_var = "result"
async = true

[[e2e.call.args]]
name = "request"
field = "input"
type = "json_object"

[e2e.call.overrides.node]
client_factory = "createClient"

[e2e.call.overrides.php]
php_client_factory = "createClient"
options_via = "json"

[e2e.call.overrides.wasm]
