languages = ["python", "node", "ruby", "php", "ffi", "go", "java", "csharp", "elixir", "wasm"]

[crate]
name = "liter-llm"
core_import = "liter_llm"
sources = [
    "crates/liter-llm/src/error.rs",
    "crates/liter-llm/src/bindings.rs",
    "crates/liter-llm/src/types/common.rs",
    "crates/liter-llm/src/types/chat.rs",
    "crates/liter-llm/src/types/embedding.rs",
    "crates/liter-llm/src/types/image.rs",
    "crates/liter-llm/src/types/audio.rs",
    "crates/liter-llm/src/types/moderation.rs",
    "crates/liter-llm/src/types/rerank.rs",
    "crates/liter-llm/src/types/search.rs",
    "crates/liter-llm/src/types/ocr.rs",
    "crates/liter-llm/src/types/models.rs",
    "crates/liter-llm/src/client/mod.rs",
    "crates/liter-llm/src/provider/custom.rs",
]
version_from = "Cargo.toml"
workspace_root = "."
features = ["native-http", "full"]

[exclude]
types = [
    # Traits (can't cross FFI)
    "LlmClient",
    "LlmClientRaw",
    "BatchClient",
    "FileClient",
    "ResponseClient",
    # Opaque async types
    "BoxFuture",
    "BoxStream",
    # Types with Arc<dyn Trait> / generics
    "ClientConfig",
    "ClientConfigBuilder",
    "PreparedRequest",
    "RawExchange",
    "RawStreamExchange",
    # Internal error types
    "ErrorResponse",
    "ApiError",
    # Tower middleware (feature-gated, generic Service types)
    "BudgetConfig",
    "BudgetState",
    "BudgetLayer",
    "CacheConfig",
    "CacheStore",
    "InMemoryStore",
    "CacheLayer",
    "OpenDalCacheStore",
    "CooldownLayer",
    "CostTrackingLayer",
    "HealthCheckLayer",
    "HealthCheckService",
    "LlmHook",
    "HooksLayer",
    "RateLimitConfig",
    "ModelRateLimitLayer",
    "RouterState",
    "Router",
    "LlmService",
    "TracingLayer",
    # Auth credential providers (Arc<dyn>, async trait methods)
    "AzureAdCredentialProvider",
    "WebIdentityCredentialProvider",
    "GithubCopilotCredentialProvider",
    "VertexOAuthCredentialProvider",
    "CredentialProvider",
    "StaticTokenProvider",
    # File config (has provider Vec, enum fields)
    "FileConfig",
    "FileCacheConfig",
    "FileBudgetConfig",
    "FileRateLimitConfig",
    "FileProviderConfig",
    # Managed client (Tower-dependent)
    "ManagedClient",
    # Internal provider
    "ModelPricing",
]
methods = [
    # Raw methods on DefaultClient
    "DefaultClient.chat_raw",
    "DefaultClient.chat_stream_raw",
    "DefaultClient.embed_raw",
    "DefaultClient.image_generate_raw",
    "DefaultClient.transcribe_raw",
    "DefaultClient.moderate_raw",
    "DefaultClient.rerank_raw",
    "DefaultClient.search_raw",
    "DefaultClient.ocr_raw",
    # Batch/File/Response methods on DefaultClient
    "DefaultClient.create_batch",
    "DefaultClient.retrieve_batch",
    "DefaultClient.list_batches",
    "DefaultClient.cancel_batch",
    "DefaultClient.create_file",
    "DefaultClient.retrieve_file",
    "DefaultClient.delete_file",
    "DefaultClient.list_files",
    "DefaultClient.file_content",
    "DefaultClient.create_response",
    "DefaultClient.retrieve_response",
    "DefaultClient.cancel_response",
    # Constructor takes ClientConfig (excluded type) — use create_client() instead
    "DefaultClient.new",
    # Internal provider methods
    "DefaultClient.resolve_provider_for_model",
    "DefaultClient.resolve_auth_header",
    "DefaultClient.resolve_auth_header_for_provider",
    "DefaultClient.all_headers",
    "DefaultClient.all_headers_for_provider",
    "DefaultClient.prepare_request",
    # Methods returning bytes::Bytes
    "DefaultClient.speech",
    "DefaultClient.file_content",
    # Error internal methods
    "LiterLlmError.from_status",
    # Methods that require binding→core From on output types (not yet supported)
    "ChatCompletionResponse.estimated_cost",
    "EmbeddingResponse.estimated_cost",
    # Internal error methods
    "LiterLlmError.is_transient",
    "LiterLlmError.error_type",
]
functions = ["str_pair", "build_provider"]

[output]
python = "crates/liter-llm-py/src/"
node = "crates/liter-llm-node/src/"
ruby = "packages/ruby/ext/liter_llm_rb/src/"
php = "crates/liter-llm-php/src/"
ffi = "crates/liter-llm-ffi/src/"
go = "packages/go/"
elixir = "packages/elixir/native/liter_llm_rustler/src/"
wasm = "crates/liter-llm-wasm/src/"
java = "packages/java/"
csharp = "packages/csharp/"

[python]
module_name = "_internal_bindings"
pip_name = "liter-llm"

[python.stubs]
output = "packages/python/liter_llm/"

[node]
package_name = "@kreuzberg/liter-llm-native"

[ffi]
prefix = "literllm"
header_name = "liter_llm.h"
lib_name = "liter_llm_ffi"

[go]
module = "github.com/kreuzberg-dev/liter-llm/packages/go"
package_name = "literllm"

[java]
package = "dev.kreuzberg.literllm"

[csharp]
namespace = "LiterLlm"

[ruby]
gem_name = "liter_llm"

[ruby.stubs]
output = "packages/ruby/sig/"

[elixir]
app_name = "liter_llm"

[wasm]
# DefaultClient requires native-http which WASM doesn't have
exclude_types = ["DefaultClient"]
exclude_functions = ["create_client", "create_client_from_json"]

# Streaming adapter for chat_stream
[[adapters]]
name = "chat_stream"
pattern = "streaming"
core_path = "chat_stream"
owner_type = "DefaultClient"
item_type = "ChatCompletionChunk"
error_type = "LiterLlmError"

[[adapters.params]]
name = "req"
type = "ChatCompletionRequest"

[scaffold]
description = "Universal LLM API client — 142+ providers, streaming, tool calling. Rust-powered with polyglot bindings."
license = "MIT"
repository = "https://github.com/kreuzberg-dev/liter-llm"
authors = ["Na'aman Hirschfeld"]
keywords = ["llm", "api-client", "openai", "anthropic"]

[e2e]
fixtures = "fixtures"
output = "e2e"

[e2e.call]
function = "chat"
module = "liter_llm"
result_var = "result"
async = true

[[e2e.call.args]]
name = "request"
field = "request"
type = "json_object"
optional = false

[sync]
extra_paths = ["pyproject.toml"]
