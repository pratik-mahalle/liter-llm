language = "C"
include_guard = "LITER_LM_FFI_H"
pragma_once = true
header = "/* Auto-generated C bindings for liter-lm */"
autogen_warning = "/* Warning, this file is autogenerated by cbindgen. Don't modify this manually. */"
documentation = true
line_length = 100
after_includes = """
/* Symbol visibility */
#ifndef LITER_LM_EXPORT
  #if defined(LITER_LM_STATIC)
    #define LITER_LM_EXPORT
  #elif defined(_WIN32) || defined(__CYGWIN__)
    #ifdef LITER_LM_BUILDING
      #define LITER_LM_EXPORT __declspec(dllexport)
    #else
      #define LITER_LM_EXPORT __declspec(dllimport)
    #endif
  #elif defined(__GNUC__) || defined(__clang__)
    #define LITER_LM_EXPORT __attribute__((visibility("default")))
  #else
    #define LITER_LM_EXPORT
  #endif
#endif

/* Compiler attribute helpers
 *
 * LITER_LM_WARN_UNUSED  — caller must not discard the return value (e.g. an
 *                         allocated pointer or an error code).
 * LITER_LM_NONNULL(...) — the listed 1-based argument positions must never be
 *                         NULL.  Callers that pass NULL trigger UB; annotating
 *                         this lets GCC/Clang warn at compile time.
 */
#if defined(__GNUC__) || defined(__clang__)
#  define LITER_LM_WARN_UNUSED   __attribute__((warn_unused_result))
#  define LITER_LM_NONNULL(...)  __attribute__((nonnull(__VA_ARGS__)))
#else
#  define LITER_LM_WARN_UNUSED
#  define LITER_LM_NONNULL(...)
#endif

/**
 * Opaque handle to a liter-lm client.
 * Create with literlm_client_new(), free with literlm_client_free().
 */
typedef struct LiterLmClient LiterLmClient;
"""

[fn]
prefix = "LITER_LM_EXPORT"

[export]
# LiterLmClient is emitted as an opaque typedef in after_includes above;
# exclude it from cbindgen's automatic struct export to avoid a duplicate
# or broken definition referencing a private Rust type.
exclude = ["LiterLmClient"]

[parse]
parse_deps = false
include = []
