$schema: https://raw.githubusercontent.com/Goldziher/ai-rulez/main/schema/ai-rules-v3.schema.json
description: Universal LM API client with polyglot bindings — unified access to 142+ LLM providers with native bindings for Rust, Python, TypeScript, Go, Java, Ruby, PHP, C#, Elixir, and WebAssembly.
gitignore: true
name: Liter-LM
header:
  style: minimal
includes:
  - name: kreuzberg-core
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/core
    merge_strategy: local-override
  - name: kreuzberg-languages
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/languages
    merge_strategy: local-override
  - name: kreuzberg-cicd
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/cicd
    merge_strategy: local-override
  - name: kreuzberg-e2e-generator
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/e2e-generator
    merge_strategy: local-override
builtins:
  - rust
  - python
  - typescript
  - go
  - java
  - ruby
  - php
  - csharp
  - elixir
  - security
  - git-workflow
  - code-quality
  - testing
  - token-efficiency
  - default-commands
presets:
  - claude
  - gemini
  - codex
version: "3.0"
installed_skills:
  - name: alef
    source: https://github.com/kreuzberg-dev/alef.git
    description: Generate fully-typed polyglot language bindings for Rust libraries using Alef
