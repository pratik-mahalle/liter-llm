[package]
name = "liter_llm_nif"
version = "1.2.2"
edition = "2024"
license = "MIT"
description = "Universal LLM API client — 142+ providers, streaming, tool calling. Rust-powered with polyglot bindings."
readme = false
keywords = ["llm", "api-client", "openai", "anthropic"]
categories = ["text-processing"]

[package.metadata.cargo-machete]
ignored = ["liter-llm", "rustler", "serde", "serde_json", "tokio"]

[lib]
crate-type = ["cdylib"]

[dependencies]
liter-llm = { path = "../../../../crates/liter-llm", features = ["native-http", "full"] }
rustler = "0.37"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
