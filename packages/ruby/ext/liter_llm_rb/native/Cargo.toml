[package]
name = "liter-llm-rb"
version = "1.1.0"
edition = "2024"
authors = ["Na'aman Hirschfeld <naaman@kreuzberg.dev>"]
license = "MIT"
repository = "https://github.com/kreuzberg-dev/liter-llm"
homepage = "https://kreuzberg.dev"
description = "Ruby bindings (Magnus) for liter-llm universal LM API client"
keywords = ["ruby", "magnus", "llm", "api-client", "bindings"]
categories = ["api-bindings"]

[lib]
name = "liter_llm_rb"
crate-type = ["cdylib", "rlib"]

[dependencies]
base64 = "0.22"
futures-core = "0.3"
liter-llm = { path = "../../../../../crates/liter-llm", features = ["full"] }
magnus = { version = "0.8", features = ["rb-sys"] }
rb-sys = { version = "0.9", default-features = false, features = [
    "stable-api-compiled-fallback",
] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }

[dev-dependencies]
pretty_assertions = "1"

[package.metadata.cargo-machete]
ignored = ["rb-sys"]
