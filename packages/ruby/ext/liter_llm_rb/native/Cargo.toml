[package]
name = "liter-llm-rb"
version = "1.2.2"
edition = "2024"
license = "MIT"
description = "Universal LLM API client — 142+ providers, streaming, tool calling. Rust-powered with polyglot bindings."
readme = "README.md"
keywords = ["llm", "api-client", "openai", "anthropic"]
categories = ["text-processing"]

[lib]
crate-type = ["cdylib"]

[dependencies]
liter-llm = { path = "../../../../crates/liter-llm", features = ["native-http", "full"] }
magnus = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }
