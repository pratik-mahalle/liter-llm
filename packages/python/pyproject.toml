[build-system]
build-backend = "maturin"
requires = [ "maturin>=1,<2" ]

[project]
name = "liter-lm"
version = "0.1.0"
description = """\
  High-performance LLM client library for Python. Unified interface for streaming, tool calling, and provider routing \
  across OpenAI, Anthropic, and 50+ LLM providers. Powered by Rust core.\
  """
readme = "README.md"
keywords = [
  "anthropic",
  "async",
  "llm",
  "llm-client",
  "openai",
  "provider-routing",
  "rust",
  "streaming",
  "tool-calling",
]
license = { text = "MIT" }
maintainers = [ { name = "Na'aman Hirschfeld", email = "naaman@kreuzberg.dev" } ]
authors = [ { name = "Na'aman Hirschfeld", email = "naaman@kreuzberg.dev" } ]
requires-python = ">=3.10"
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Rust",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
]
dependencies = [ "typing-extensions>=4.15; python_version<'3.13'" ]
urls.Changelog = "https://github.com/kreuzberg-dev/liter-lm/blob/main/CHANGELOG.md"
urls.Homepage = "https://github.com/kreuzberg-dev/liter-lm"
urls.Issues = "https://github.com/kreuzberg-dev/liter-lm/issues"
urls.Repository = "https://github.com/kreuzberg-dev/liter-lm"
urls.Source = "https://github.com/kreuzberg-dev/liter-lm"

[tool.maturin]
module-name = "liter_lm._internal_bindings"
manifest-path = "../../crates/liter-lm-py/Cargo.toml"
include = [
  { path = "liter_lm/_internal_bindings.pyi", format = [ "wheel", "sdist" ] },
  { path = "liter_lm/py.typed", format = [ "wheel", "sdist" ] },
]

[tool.pytest]
ini_options.asyncio_mode = "auto"
ini_options.timeout = 60
ini_options.timeout_method = "thread"
