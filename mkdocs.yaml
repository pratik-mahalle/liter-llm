site_name: liter-llm
site_description: "Universal LLM API client for 100+ providers with polyglot bindings."
site_url: https://docs.liter-llm.kreuzberg.dev
site_author: kreuzberg.dev
repo_name: kreuzberg-dev/liter-llm
repo_url: https://github.com/kreuzberg-dev/liter-llm
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2024-2026 Kreuzberg.dev

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: sun
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: moon
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
    - announce.dismiss
    - content.action.edit
    - content.action.view
  icon:
    repo: github
    search: search
  language: en

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - docs/overrides/.icons
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      linenums: false
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path: ["docs", "."]
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search
  - social:
      cards: false
  - tags
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kreuzberg-dev/liter-llm
      name: View on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/liter-llm/
      name: View on PyPI
    - icon: fontawesome/brands/docker
      link: https://github.com/kreuzberg-dev/liter-llm/pkgs/container/liter-llm
      name: View on GitHub Container Registry
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/@kreuzberg/liter-llm
      name: View on npm
    - icon: fontawesome/brands/rust
      link: https://crates.io/crates/liter-llm
      name: View on crates.io
  status:
    new: Recently added
    deprecated: Deprecated
  repo:
    stars: true
    forks: true

extra_css:
  - css/extra.css

nav:
  - Home: index.md
  - Installation: getting-started/installation.md
  - Quick Start: getting-started/quickstart.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Provider Registry: concepts/providers.md
      - Streaming: concepts/streaming.md
  - Guides:
      - Chat: guides/chat.md
      - Streaming: guides/streaming.md
      - Embeddings: guides/embeddings.md
      - Configuration: guides/configuration.md
      - CLI Usage: guides/cli.md
  - API Reference:
      - Python: api/python.md
      - TypeScript / Node.js: api/typescript.md
      - Rust: api/rust.md
      - Go: api/go.md
      - Java: api/java.md
      - "C# / .NET": api/csharp.md
      - Ruby: api/ruby.md
      - Elixir: api/elixir.md
      - PHP: api/php.md
      - WebAssembly: api/wasm.md
      - C / FFI: api/c-ffi.md
  - Providers: providers.md
  - Changelog: CHANGELOG.md
  - Contributing: contributing.md
