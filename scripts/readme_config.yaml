version: "1.1.0"
license: "MIT"

languages:
  rust:
    name: Rust
    template: language_package.md.jinja
    output_path: crates/liter-llm/README.md
    package_manager:
      - cargo
    package_name: liter-llm
    badge_url: https://img.shields.io/crates/v/liter-llm?label=Rust&color=007ec6
    docs_url: https://docs.liter-llm.kreuzberg.dev
    description: |
      Universal LLM API client for Rust. Access 142+ LLM providers — OpenAI, Anthropic, Groq, Mistral, and more — through a single unified interface. Async/await with Tokio, streaming via BoxStream, composable Tower middleware stack, and compile-time type safety.
    features:
      streaming: true
      async: true
      tool_calling: true
      provider_routing: true
      cost_tracking: true
      search: true
      ocr: true
      caching: true
    optional_sections:
      - async_support
      - streaming_support
      - tool_calling
      - middleware_stack
    snippets:
      basic_chat: getting-started/basic_chat.md
      streaming: getting-started/streaming.md

