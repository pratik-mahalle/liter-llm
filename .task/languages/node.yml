version: "3"

tasks:
  deps:
    desc: Install Node.js dependencies
    dir: crates/liter-llm-node
    cmds:
      - pnpm install

  install:
    desc: Install Node.js dependencies (alias for deps)
    cmds:
      - task: deps

  update:
    desc: Update Node/TypeScript dependencies (all workspace packages)
    cmds:
      - echo "Updating Node/TypeScript dependencies across workspace..."
      - corepack up
      - pnpm up --latest -r
      - pnpm up --latest -w

  build:
    desc: Build NAPI-RS native module (release)
    dir: crates/liter-llm-node
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - napi build --release

  build:dev:
    desc: Build NAPI-RS native module (debug)
    dir: crates/liter-llm-node
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - napi build

  test:
    desc: Smoke test Node.js native module
    dir: crates/liter-llm-node
    cmds:
      - node -e "const m = require('./'); console.log('Module loaded:', Object.keys(m))"

  lint:
    desc: Lint TypeScript/JavaScript code
    cmds:
      - npx biome lint --fix .
      - npx oxlint --fix .

  lint:check:
    desc: Check TypeScript/JavaScript linting (CI)
    cmds:
      - npx biome lint .
      - npx oxlint .

  format:
    desc: Format TypeScript/JavaScript code
    cmds:
      - npx biome format --write .

  format:check:
    desc: Check TypeScript/JavaScript formatting (CI)
    cmds:
      - npx biome format .

  typecheck:
    desc: Check TypeScript types (tsc --noEmit)
    cmds:
      - npx tsc --noEmit

  clean:
    desc: Clean Node.js build artifacts
    dir: crates/liter-llm-node
    cmds:
      - rm -f *.node

  e2e:generate:
    desc: Generate TypeScript/Node E2E tests from fixtures
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - cargo run -p e2e-generator -- generate --lang typescript

  e2e:test:
    desc: Run TypeScript/Node E2E tests
    dir: e2e/typescript
    cmds:
      - pnpm install
      - npx vitest run
