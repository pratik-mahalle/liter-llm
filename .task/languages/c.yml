version: "3"

tasks:
  build:ffi:
    desc: Build FFI library for C tests
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - cargo build -p liter-llm-ffi --release

  build:
    desc: Build FFI library (alias for build:ffi)
    cmds:
      - task: build:ffi

  test:
    desc: Build and run C E2E tests
    cmds:
      - task: e2e:test

  clean:
    desc: Clean C build artifacts
    dir: e2e/c
    cmds:
      - rm -rf build

  e2e:generate:
    desc: Generate C E2E tests from fixtures
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - cargo run -p e2e-generator -- generate --lang c

  e2e:build:
    desc: Build C E2E tests
    deps: [build:ffi]
    dir: e2e/c
    cmds:
      - cmake -B build .
      - cmake --build build

  e2e:test:
    desc: Run C E2E tests
    deps: [e2e:build]
    dir: e2e/c/build
    cmds:
      - ctest --output-on-failure
