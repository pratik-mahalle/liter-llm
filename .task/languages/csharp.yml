version: "3"

vars:
  FFI_LIB_PATH: '{{.PROJECT_ROOT}}/target/release/libliter_lm_ffi.{{if eq OS "darwin"}}dylib{{else if eq OS "windows"}}dll{{else}}so{{end}}'
  DOTNET_VERSION: "10.0"

tasks:
  install:
    desc: Restore C# dependencies
    dir: packages/csharp
    cmds:
      - dotnet restore LiterLm.slnx

  build:ffi:
    desc: Build FFI shared library for C#
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - cargo build -p liter-lm-ffi --release

  build:
    desc: Build C# binding (depends on Rust FFI)
    dir: packages/csharp
    cmds:
      - dotnet build LiterLm.slnx -c Release

  build:dev:
    desc: Build C# binding in debug mode
    dir: packages/csharp
    cmds:
      - dotnet build LiterLm.slnx -c Debug

  build:release:
    desc: Build C# binding in release mode (optimized)
    dir: packages/csharp
    cmds:
      - dotnet build LiterLm.slnx -c Release

  build:ci:
    desc: Build C# binding in CI mode
    dir: packages/csharp
    cmds:
      - dotnet build LiterLm.slnx -c Release

  package:
    desc: Pack C# NuGet package for publishing
    dir: packages/csharp
    cmds:
      - dotnet pack LiterLm/LiterLm.csproj -c Release --no-build {{.CLI_ARGS | default ""}}

  test:
    desc: Run C# tests (requires FFI built first)
    deps: [build:ffi]
    dir: packages/csharp
    env:
      LD_LIBRARY_PATH: "{{.PROJECT_ROOT}}/target/release:${LD_LIBRARY_PATH:-}"
      DYLD_LIBRARY_PATH: "{{.PROJECT_ROOT}}/target/release:${DYLD_LIBRARY_PATH:-}"
    cmds:
      - dotnet test LiterLm.slnx -c Release

  test:ci:
    desc: Run C# tests in CI mode
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
    dir: packages/csharp
    cmds:
      - dotnet test LiterLm.slnx -c Release

  test:verbose:
    desc: Run C# tests with verbose output
    dir: packages/csharp
    cmds:
      - dotnet test LiterLm.slnx -c Release --verbosity detailed

  lint:
    desc: Lint all C# code for style violations with auto-fix (dotnet format)
    dir: packages/csharp
    cmds:
      - dotnet format LiterLm.slnx

  lint:check:
    desc: Check all C# code style violations without modifications (dotnet format verify)
    dir: packages/csharp
    cmds:
      - dotnet restore LiterLm.slnx
      - dotnet format LiterLm.slnx --verify-no-changes

  format:
    desc: Format C# code with automatic style corrections (dotnet format)
    dir: packages/csharp
    cmds:
      - dotnet format LiterLm.slnx

  format:check:
    desc: Check C# code formatting without modifications (dotnet format verify)
    dir: packages/csharp
    cmds:
      - dotnet restore LiterLm.slnx
      - dotnet format LiterLm.slnx --verify-no-changes

  clean:
    desc: Clean C# build artifacts
    dir: packages/csharp
    cmds:
      - python -c "import shutil; [shutil.rmtree(d, ignore_errors=True) for d in ['bin', 'obj', '.vs']]"
      - dotnet clean LiterLm.slnx

  update:
    desc: Update C# dependencies to latest versions (including major versions)
    dir: packages/csharp
    cmds:
      - echo "Updating C# dependencies to latest versions..."
      - dotnet tool install --global dotnet-outdated-tool || dotnet tool update --global dotnet-outdated-tool
      - dotnet outdated LiterLm.slnx --upgrade
      - echo "Checking remaining outdated packages..."
      - dotnet list LiterLm.slnx package --outdated || true

  e2e:generate:
    desc: Generate C# E2E tests from fixtures
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - cargo run -p codegen -- generate --lang csharp
      - task: e2e:format

  e2e:format:
    desc: Format C# E2E code
    cmds:
      - cmd: bash -c "cd e2e/csharp && dotnet format LiterLm.E2E.csproj"
        platforms: [linux, darwin]
      - cmd: cd e2e/csharp && dotnet format LiterLm.E2E.csproj
        platforms: [windows]

  e2e:lint:
    desc: Lint C# E2E code
    cmds:
      - cmd: bash -c "cd e2e/csharp && dotnet format --verify-no-changes"
        platforms: [linux, darwin]
      - cmd: cd e2e/csharp && dotnet format --verify-no-changes
        platforms: [windows]

  e2e:test:
    desc: Run C# E2E tests
    deps: [build:ffi]
    dir: e2e/csharp
    env:
      LD_LIBRARY_PATH: "{{.PROJECT_ROOT}}/target/release:${LD_LIBRARY_PATH:-}"
      DYLD_LIBRARY_PATH: "{{.PROJECT_ROOT}}/target/release:${DYLD_LIBRARY_PATH:-}"
    cmds:
      - dotnet test -c Release

  e2e:verify:
    desc: Regenerate and validate C# E2E suite (generate + lint + test)
    cmds:
      - task: e2e:generate
      - task: e2e:lint
      - task: e2e:test
