name: CI Local LLM Integration

on:
  push:
    branches: [main]
    paths:
      - schemas/providers.json
      - crates/liter-llm/src/provider/**
      - crates/liter-llm/tests/local_llm.rs
      - docker/docker-compose.local-llm.yml
      - .task/workflows/local.yml
      - fixtures/smoke/local_*
      - .github/workflows/ci-local-llm.yaml
  pull_request:
    branches: [main]
    paths:
      - schemas/providers.json
      - crates/liter-llm/src/provider/**
      - crates/liter-llm/tests/local_llm.rs
      - docker/docker-compose.local-llm.yml
      - .task/workflows/local.yml
      - fixtures/smoke/local_*
      - .github/workflows/ci-local-llm.yaml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-local-llm-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  local-llm-integration:
    name: Local LLM Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull models
        run: |
          ollama serve &
          echo "Waiting for Ollama to be ready..."
          for _i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready"
              break
            fi
            sleep 1
          done
          ollama pull qwen2:0.5b
          ollama pull all-minilm
          curl -sf http://localhost:11434/v1/models

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1

      - name: Run local LLM integration tests
        # Sequential: all tests share single Ollama instance; parallel would cause contention
        run: >
          cargo test -p liter-llm --test local_llm
          -- --ignored --test-threads=1
        env:
          OLLAMA_BASE_URL: http://localhost:11434
          RUST_BACKTRACE: full
