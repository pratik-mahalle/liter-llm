name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v1.0.0-rc.1)"
        required: true
        type: string
      dry_run:
        description: "Dry run — build everything but skip registry publishes"
        required: false
        default: "false"
        type: boolean
      force_republish:
        description: "Force publish even if the version already exists in registries"
        required: false
        type: boolean
        default: false
      republish:
        description: "Delete and re-create the tag on current HEAD before publishing (retag + full republish)"
        required: false
        type: boolean
        default: false
      targets:
        description: "Comma-separated targets to publish (empty = all). Values: crates python node wasm ruby go java elixir csharp php"
        required: false
        default: ""
        type: string
  release:
    types: [published]
  repository_dispatch:
    types: [publish-release]

concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.tag)) || github.ref || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

# ─────────────────────────────────────────────────────────────────────────────
# Phase 1 — Prepare
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      tag:              ${{ steps.info.outputs.tag }}
      version:          ${{ steps.info.outputs.version }}
      npm_tag:          ${{ steps.info.outputs.npm_tag }}
      dry_run:          ${{ steps.info.outputs.dry_run }}
      force_republish:  ${{ steps.info.outputs.force_republish }}
      release_crates:   ${{ steps.targets.outputs.crates }}
      release_python:   ${{ steps.targets.outputs.python }}
      release_node:     ${{ steps.targets.outputs.node }}
      release_wasm:     ${{ steps.targets.outputs.wasm }}
      release_ruby:     ${{ steps.targets.outputs.ruby }}
      release_go:       ${{ steps.targets.outputs.go }}
      release_java:     ${{ steps.targets.outputs.java }}
      release_elixir:   ${{ steps.targets.outputs.elixir }}
      release_csharp:   ${{ steps.targets.outputs.csharp }}
      release_php:      ${{ steps.targets.outputs.php }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Retag for republish
        if: ${{ inputs.republish == true || github.event.client_payload.republish == true }}
        env:
          TAG: ${{ inputs.tag || github.event.client_payload.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "${TAG}" ]]; then
            echo "::error::republish requires a tag input"
            exit 1
          fi
          sha="$(git rev-parse HEAD)"
          echo "::notice::Republish requested — deleting and re-creating tag ${TAG} on ${sha:0:8}"
          gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}" -X DELETE 2>/dev/null || true
          gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f "ref=refs/tags/${TAG}" \
            -f "sha=${sha}" --silent
          git tag -d "${TAG}" 2>/dev/null || true
          git tag "${TAG}" "${sha}"
        shell: bash

      - name: Extract tag and version
        id: info
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            TAG="${{ github.event.client_payload.tag }}"
            DRY_RUN="${{ github.event.client_payload.dry_run || 'false' }}"
            FORCE="${{ github.event.client_payload.force_republish || 'false' }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.ref_name }}"
            DRY_RUN="false"
            FORCE="false"
          else
            TAG="${{ inputs.tag }}"
            DRY_RUN="${{ inputs.dry_run }}"
            FORCE="${{ inputs.force_republish }}"
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Determine npm dist-tag: pre-releases → next, stable → latest
          if echo "$VERSION" | grep -qE '(alpha|beta|rc)'; then
            echo "npm_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "force_republish=$FORCE" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Resolve target list
        id: targets
        run: |
          REQUESTED="${{ inputs.targets || github.event.client_payload.targets }}"
          ALL="crates python node wasm ruby go java elixir csharp php"
          emit() {
            local name="$1"
            if [ -z "$REQUESTED" ] || echo ",$REQUESTED," | grep -q ",$name,"; then
              echo "${name}=true" >> "$GITHUB_OUTPUT"
            else
              echo "${name}=false" >> "$GITHUB_OUTPUT"
            fi
          }
          for t in $ALL; do emit "$t"; done
        shell: bash

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 2 — Validate version consistency
  # ─────────────────────────────────────────────────────────────────────────
  validate-versions:
    name: Validate versions
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Check version consistency
        env:
          EXPECTED: ${{ needs.prepare.outputs.version }}
        run: |
          fail=0
          check() {
            local label="$1" actual="$2"
            if [ "$actual" != "$EXPECTED" ]; then
              echo "::error::$label: expected $EXPECTED, got $actual"
              fail=1
            else
              echo "✓ $label: $actual"
            fi
          }
          # Cargo workspace (reads [workspace.package] version)
          check "Cargo.toml" "$(grep -m1 '^version = "' Cargo.toml | grep -oP '"\K[^"]+')"
          # Python — normalize PEP 440 to semver before comparing (e.g. 1.0.0rc1 → 1.0.0-rc.1)
          PY_VER=$(grep -m1 '^version' packages/python/pyproject.toml | grep -oP '"\K[^"]+')
          PY_VER_NORM=$(echo "$PY_VER" \
            | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+)rc([0-9]+)/\1-rc.\2/' \
            | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+)a([0-9]+)/\1-alpha.\2/' \
            | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+)b([0-9]+)/\1-beta.\2/')
          check "pyproject.toml" "$PY_VER_NORM"
          # Node
          check "package.json (node)" "$(python3 -c "import json; print(json.load(open('packages/typescript/package.json'))['version'])")"
          # Ruby gemspec (gem format "1.0.0.pre.rc.1" → semver "1.0.0-rc.1")
          GEM_VER=$(grep 'spec.version' packages/ruby/liter_llm.gemspec | grep -oP "['\"]\K[^'\"]+" | sed 's/\.pre\./-/')
          check "liter_llm.gemspec" "$GEM_VER"
          # Java
          check "pom.xml" "$(grep -m1 '<version>' packages/java/pom.xml | grep -oP '>\K[^<]+')"
          # Elixir
          check "mix.exs" "$(grep '@version' packages/elixir/mix.exs | grep -oP '"\K[^"]+')"
          # C#
          check "LiterLlm.csproj" "$(grep '<Version>' packages/csharp/LiterLlm/LiterLlm.csproj | grep -oP '>\K[^<]+')"
          # PHP
          check "composer.json" "$(python3 -c "import json; print(json.load(open('composer.json')).get('version',''))")"
          exit $fail
        shell: bash

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 3 — Idempotency checks (all parallel)
  # ─────────────────────────────────────────────────────────────────────────
  check-cratesio:
    name: Check crates.io
    needs: [prepare]
    if: needs.prepare.outputs.release_crates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: kreuzberg-dev/actions/check-registry@v1
        id: check
        with:
          registry: cratesio
          package: liter-llm
          version: ${{ needs.prepare.outputs.version }}

  check-pypi:
    name: Check PyPI
    needs: [prepare]
    if: needs.prepare.outputs.release_python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: kreuzberg-dev/actions/check-registry@v1
        id: check
        with:
          registry: pypi
          package: liter-llm
          version: ${{ needs.prepare.outputs.version }}

  check-npm:
    name: Check npm (@kreuzberg/liter-llm)
    needs: [prepare]
    if: needs.prepare.outputs.release_node == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: kreuzberg-dev/actions/check-registry@v1
        id: check
        with:
          registry: npm
          package: "@kreuzberg/liter-llm"
          version: ${{ needs.prepare.outputs.version }}

  check-npm-wasm:
    name: Check npm (@kreuzberg/liter-llm-wasm)
    needs: [prepare]
    if: needs.prepare.outputs.release_wasm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: kreuzberg-dev/actions/check-registry@v1
        id: check
        with:
          registry: npm
          package: "@kreuzberg/liter-llm-wasm"
          version: ${{ needs.prepare.outputs.version }}

  check-rubygems:
    name: Check RubyGems
    needs: [prepare]
    if: needs.prepare.outputs.release_ruby == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: kreuzberg-dev/actions/check-registry@v1
        id: check
        with:
          registry: rubygems
          package: liter_llm
          version: ${{ needs.prepare.outputs.version }}

  check-maven:
    name: Check Maven Central
    needs: [prepare]
    if: needs.prepare.outputs.release_java == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: kreuzberg-dev/actions/check-registry@v1
        id: check
        with:
          registry: maven
          package: "dev.kreuzberg:liter-llm"
          version: ${{ needs.prepare.outputs.version }}

  check-hex:
    name: Check Hex.pm
    needs: [prepare]
    if: needs.prepare.outputs.release_elixir == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: kreuzberg-dev/actions/check-registry@v1
        id: check
        with:
          registry: hex
          package: liter_llm
          version: ${{ needs.prepare.outputs.version }}

  check-packagist:
    name: Check Packagist
    needs: [prepare]
    if: needs.prepare.outputs.release_php == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: kreuzberg-dev/actions/check-registry@v1
        id: check
        with:
          registry: packagist
          package: kreuzberg/liter-llm
          version: ${{ needs.prepare.outputs.version }}

  check-nuget:
    name: Check NuGet
    needs: [prepare]
    if: needs.prepare.outputs.release_csharp == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: kreuzberg-dev/actions/check-registry@v1
        id: check
        with:
          registry: nuget
          package: LiterLlm
          version: ${{ needs.prepare.outputs.version }}

  check-go:
    name: Check Go FFI release assets
    needs: [prepare]
    if: needs.prepare.outputs.release_go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check release assets
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          ASSET="liter-llm-ffi-v${VERSION}-linux-x64.tar.gz"
          if gh release view "$TAG" --repo ${{ github.repository }} --json assets \
              | jq -e --arg name "$ASSET" '.assets[] | select(.name == $name)' > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 4 — Build jobs
  # ─────────────────────────────────────────────────────────────────────────

  # ── Python wheels ──────────────────────────────────────────────────────────
  build-python-wheels:
    name: Build Python wheels (${{ matrix.label }})
    needs: [prepare, check-pypi]
    if: |
      always() &&
      needs.prepare.outputs.release_python == 'true' &&
      (needs.check-pypi.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
          - label: linux-aarch64
            runner: ubuntu-24.04-arm
          - label: macos-arm64
            runner: macos-latest
          - label: windows-x86_64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: kreuzberg-dev/actions/build-python-wheels@v1
        with:
          package-dir: packages/python
          cibw-build: "cp310-* cp311-* cp312-* cp313-*"
          cibw-skip: "*-musllinux* *-win32 *-manylinux_i686 *-macosx_x86_64"
          artifact-name: python-wheel-${{ matrix.label }}

  build-python-sdist:
    name: Build Python sdist
    needs: [prepare, check-pypi]
    if: |
      always() &&
      needs.prepare.outputs.release_python == 'true' &&
      (needs.check-pypi.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - run: pip install maturin
        shell: bash
      - name: Build sdist
        run: maturin sdist --out dist
        working-directory: packages/python
        shell: bash
      - uses: actions/upload-artifact@v7
        with:
          name: python-sdist
          path: packages/python/dist/*.tar.gz
          retention-days: 14

  # ── Node.js NAPI native ────────────────────────────────────────────────────
  build-node-native:
    name: Build Node native (${{ matrix.label }})
    needs: [prepare, check-npm]
    if: |
      always() &&
      needs.prepare.outputs.release_node == 'true' &&
      (needs.check-npm.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64-gnu
            runner: ubuntu-latest
            napi_target: x86_64-unknown-linux-gnu
          - label: linux-arm64-gnu
            runner: ubuntu-24.04-arm
            napi_target: aarch64-unknown-linux-gnu
          - label: darwin-arm64
            runner: macos-latest
            napi_target: aarch64-apple-darwin
          - label: win32-x64-msvc
            runner: windows-latest
            napi_target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: ${{ matrix.napi_target }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install -g @napi-rs/cli
        shell: bash
      - name: Build NAPI binding
        run: napi build --release --platform --target ${{ matrix.napi_target }}
        working-directory: crates/liter-llm-node
        shell: bash
      - uses: actions/upload-artifact@v7
        with:
          name: node-native-${{ matrix.label }}
          path: crates/liter-llm-node/*.node
          retention-days: 14

  # ── WebAssembly ────────────────────────────────────────────────────────────
  build-wasm:
    name: Build WASM
    needs: [prepare, check-npm-wasm]
    if: |
      always() &&
      needs.prepare.outputs.release_wasm == 'true' &&
      (needs.check-npm-wasm.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
        shell: bash
      - name: Build WASM package
        env:
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
        run: wasm-pack build --target web --release
        working-directory: crates/liter-llm-wasm
        shell: bash
      - name: Patch pkg/package.json
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          python3 - <<'EOF'
          import json, os
          path = "crates/liter-llm-wasm/pkg/package.json"
          with open(path) as f:
            pkg = json.load(f)
          pkg["name"] = "@kreuzberg/liter-llm-wasm"
          pkg["version"] = os.environ["VERSION"]
          pkg["publishConfig"] = {"registry": "https://registry.npmjs.org/", "access": "public"}
          with open(path, "w") as f:
            json.dump(pkg, f, indent=2)
          EOF
        shell: bash
      - uses: actions/upload-artifact@v7
        with:
          name: wasm-pkg
          path: crates/liter-llm-wasm/pkg/
          retention-days: 14

  # ── Ruby gems ──────────────────────────────────────────────────────────────
  build-ruby-gem:
    name: Build Ruby gem (${{ matrix.label }})
    needs: [prepare, check-rubygems]
    if: |
      always() &&
      needs.prepare.outputs.release_ruby == 'true' &&
      (needs.check-rubygems.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            ruby_platform: x86_64-linux
          - label: linux-aarch64
            runner: ubuntu-24.04-arm
            ruby_platform: aarch64-linux
          - label: macos-arm64
            runner: macos-latest
            ruby_platform: arm64-darwin
    env:
      RB_SYS_CARGO_PROFILE: release
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: publish-ruby-${{ matrix.label }}
          use-sccache: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler: none
          bundler-cache: false

      - name: Install Bundler
        shell: bash
        run: (gem install bundler -v 4.0.0 --no-document || gem install bundler --no-document) && bundler --version

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Build FFI library
        run: cargo build -p liter-llm-ffi --release
        shell: bash

      - name: Vendor liter-llm core crate
        shell: bash
        run: python3 scripts/ci/ruby/vendor-liter-llm-core.py

      - name: Install Ruby dependencies
        shell: bash
        working-directory: packages/ruby
        run: |
          bundle config set --local path vendor/bundle
          bundle check || bundle install

      - name: Compile native extension
        shell: bash
        working-directory: packages/ruby
        timeout-minutes: 60
        run: |
          echo "Compiling native extension..."
          if ! bundle exec rake compile 2>&1 | tee compile.log; then
            echo "ERROR: Rake compile failed with exit code ${PIPESTATUS[0]}" >&2
            exit 1
          fi
          echo "Native extension compiled successfully"
          echo "=== Native libraries ==="
          find lib -name '*.so' -o -name '*.bundle' -o -name '*.dylib' 2>/dev/null | head -20

      - name: Build platform gem
        shell: bash
        working-directory: packages/ruby
        run: ruby ../../scripts/publish/ruby/build-native-gem.rb "${{ matrix.ruby_platform }}"

      - name: Verify platform gem was built
        shell: bash
        working-directory: packages/ruby
        run: |
          if [ ! -d pkg ]; then
            echo "ERROR: pkg directory does not exist" >&2
            ls -la >&2
            exit 1
          fi
          if ! find pkg -maxdepth 1 -name "liter_llm-*-${{ matrix.ruby_platform }}.gem" -print -quit | grep -q .; then
            echo "ERROR: No platform gem for ${{ matrix.ruby_platform }} found in pkg/" >&2
            ls -la pkg/ >&2
            exit 1
          fi
          echo "Platform gem built successfully:"
          ls -lh pkg/*.gem

      - uses: actions/upload-artifact@v7
        with:
          name: rubygems-${{ matrix.label }}
          path: packages/ruby/pkg/*.gem
          retention-days: 14
          compression-level: 0

  # ── Elixir NIFs ────────────────────────────────────────────────────────────
  build-elixir-nifs:
    name: Build Elixir NIFs (${{ matrix.label }})
    needs: [prepare, check-hex]
    if: |
      always() &&
      needs.prepare.outputs.release_elixir == 'true' &&
      (needs.check-hex.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib_ext: so
          - label: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            lib_ext: so
          - label: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            lib_ext: dylib
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}
      - name: Build Rustler NIF
        run: >
          cargo build --release
          --target ${{ matrix.target }}
          --manifest-path packages/elixir/native/liter_llm_rustler/Cargo.toml
        shell: bash
      - name: Create NIF tarballs (nif-2.16 and nif-2.17)
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TARGET: ${{ matrix.target }}
          LIB_EXT: ${{ matrix.lib_ext }}
        run: |
          LIB_SRC="target/${TARGET}/release/libliter_llm_rustler.${LIB_EXT}"
          mkdir -p nif-tarballs
          for NIF_VER in 2.16 2.17; do
            # RustlerPrecompiled expects: lib{crate}-v{version}-nif-{nif_ver}-{target}.so.tar.gz
            TARBALL="nif-tarballs/libliter_llm_rustler-v${VERSION}-nif-${NIF_VER}-${TARGET}.so.tar.gz"
            # Rustler loads the NIF as liter_llm_rustler.so on all platforms
            cp "$LIB_SRC" "liter_llm_rustler.so"
            tar -czf "$TARBALL" "liter_llm_rustler.so"
            rm "liter_llm_rustler.so"
            echo "Created: $TARBALL"
          done
        shell: bash
      - uses: actions/upload-artifact@v7
        with:
          name: elixir-nifs-${{ matrix.label }}
          path: nif-tarballs/*.tar.gz
          retention-days: 14

  # ── PHP extension ──────────────────────────────────────────────────────────
  build-php:
    name: Build PHP extension (${{ matrix.label }})
    needs: [prepare]
    if: |
      always() &&
      needs.prepare.outputs.release_php == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os: linux
            arch: x86_64
          - label: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            os: linux
            arch: aarch64
          - label: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            os: macos
            arch: arm64
          # Windows disabled: ext-php-rs requires abi_vectorcall feature (nightly-only) on Windows
          # - label: windows-x86_64
          #   runner: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   os: windows
          #   arch: x86_64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer
      - name: Build PHP extension
        env:
          # ext-php-rs on macOS requires dynamic_lookup to resolve PHP symbols at runtime
          RUSTFLAGS: ${{ matrix.os == 'macos' && '-C link-arg=-undefined -C link-arg=dynamic_lookup' || '' }}
        run: >
          cargo build --release
          --target ${{ matrix.target }}
          --manifest-path crates/liter-llm-php/Cargo.toml
        shell: bash
      - name: Build PIE package
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          CARGO_TARGET: ${{ matrix.target }}
        run: scripts/publish/php/build-pie-package.sh "${{ matrix.label }}" "dist/php"
      - uses: actions/upload-artifact@v7
        with:
          name: php-pie-${{ matrix.label }}
          path: dist/php/liter-llm-*.tar.gz*
          retention-days: 14

  # ── Rust FFI (shared for Go / Java / C# / C consumers) ────────────────────
  build-ffi:
    name: Build Rust FFI (${{ matrix.label }})
    needs: [prepare, validate-versions, check-go, check-maven, check-nuget]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      needs.validate-versions.result == 'success' &&
      (
        (needs.prepare.outputs.release_go == 'true' &&
         (needs.check-go.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')) ||
        (needs.prepare.outputs.release_java == 'true' &&
         (needs.check-maven.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')) ||
        (needs.prepare.outputs.release_csharp == 'true' &&
         (needs.check-nuget.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true'))
      )
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rid: linux-x64
          - label: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            rid: linux-arm64
          - label: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            rid: osx-arm64
          - label: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            rid: win-x64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}
      - name: Build FFI
        shell: bash
        run: cargo build -p liter-llm-ffi --release --target ${{ matrix.target }}
      - name: Stage FFI artifacts
        env:
          TARGET: ${{ matrix.target }}
          RID: ${{ matrix.rid }}
        run: |
          # Find and stage the built libraries (dynamic + static)
          mkdir -p "ffi-staging/${RID}"
          if [[ "$TARGET" == *"windows"* ]]; then
            cp "target/${TARGET}/release/liter_llm_ffi.dll" "ffi-staging/${RID}/"
            cp "target/${TARGET}/release/liter_llm_ffi.dll.lib" "ffi-staging/${RID}/" 2>/dev/null || true
          elif [[ "$TARGET" == *"apple"* ]]; then
            cp "target/${TARGET}/release/libliter_llm_ffi.dylib" "ffi-staging/${RID}/"
            cp "target/${TARGET}/release/libliter_llm_ffi.a" "ffi-staging/${RID}/" 2>/dev/null || true
          else
            cp "target/${TARGET}/release/libliter_llm_ffi.so" "ffi-staging/${RID}/"
            cp "target/${TARGET}/release/libliter_llm_ffi.a" "ffi-staging/${RID}/" 2>/dev/null || true
          fi
          # Copy cbindgen-generated header if present
          if [ -f crates/liter-llm-ffi/include/liter_llm_ffi.h ]; then
            mkdir -p ffi-staging/include
            cp crates/liter-llm-ffi/include/liter_llm_ffi.h ffi-staging/include/
          elif [ -f crates/liter-llm-ffi/liter_llm.h ]; then
            mkdir -p ffi-staging/include
            cp crates/liter-llm-ffi/liter_llm.h ffi-staging/include/
          fi
        shell: bash
      - uses: actions/upload-artifact@v7
        with:
          name: ffi-${{ matrix.label }}
          path: ffi-staging/
          retention-days: 14

  # ── Java package assembly ──────────────────────────────────────────────────
  build-java-package:
    name: Build Java package
    needs: [prepare, check-maven, build-ffi]
    if: |
      always() &&
      needs.prepare.outputs.release_java == 'true' &&
      needs.build-ffi.result == 'success' &&
      (needs.check-maven.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: actions/download-artifact@v7
        with:
          pattern: ffi-*
          path: ffi-artifacts
          merge-multiple: true
      - name: Stage native libs for Java
        run: |
          for rid in linux-x64 linux-arm64 osx-arm64 win-x64; do
            dest="packages/java/src/main/resources/natives/${rid}"
            mkdir -p "$dest"
            find "ffi-artifacts/${rid}" -type f -print0 | xargs -0 -I{} cp {} "$dest/"
          done
        shell: bash
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
      - name: Setup Maven 3.9.11
        uses: kreuzberg-dev/actions/setup-maven@v1
      - name: Build Maven package
        run: mvn clean package -DskipTests -q
        working-directory: packages/java
        shell: bash
      - uses: actions/upload-artifact@v7
        with:
          name: maven-packages
          path: packages/java/target/*.jar
          retention-days: 14

  # ── C# NuGet assembly ──────────────────────────────────────────────────────
  build-csharp-package:
    name: Build C# NuGet package
    needs: [prepare, check-nuget, build-ffi]
    if: |
      always() &&
      needs.prepare.outputs.release_csharp == 'true' &&
      needs.build-ffi.result == 'success' &&
      (needs.check-nuget.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: actions/download-artifact@v7
        with:
          pattern: ffi-*
          path: ffi-artifacts
          merge-multiple: true
      - name: Stage native libs for C#
        run: |
          for rid in linux-x64 linux-arm64 osx-arm64 win-x64; do
            dest="packages/csharp/LiterLlm/runtimes/${rid}/native"
            mkdir -p "$dest"
            find "ffi-artifacts/${rid}" -type f -print0 | xargs -0 -I{} cp {} "$dest/"
          done
        shell: bash
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Pack NuGet package
        run: dotnet pack packages/csharp/LiterLlm/LiterLlm.csproj -c Release -o nuget-output
        shell: bash
      - uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: nuget-output/*.nupkg
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 5 — Upload release assets (Go FFI, C FFI, Elixir NIFs)
  # ─────────────────────────────────────────────────────────────────────────
  upload-go-ffi:
    name: Upload Go FFI assets
    needs: [prepare, validate-versions, check-go, build-ffi]
    if: |
      always() &&
      needs.prepare.outputs.release_go == 'true' &&
      needs.validate-versions.result == 'success' &&
      needs.build-ffi.result == 'success' &&
      (needs.check-go.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || gh release create "$TAG" --draft --repo "${{ github.repository }}" --title "$TAG"
        shell: bash
      - uses: actions/download-artifact@v7
        with:
          pattern: ffi-*
          path: ffi-artifacts
          merge-multiple: true
      - name: Create Go FFI tarballs
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p go-ffi-release
          for rid in linux-x64 linux-arm64 osx-arm64 win-x64; do
            TARBALL="go-ffi-release/liter-llm-ffi-v${VERSION}-${rid}.tar.gz"
            INCLUDE_ARG=""
            if [ -d ffi-artifacts/include ]; then
              INCLUDE_ARG="include"
            fi
            tar -czf "$TARBALL" \
              -C ffi-artifacts \
              "${rid}" \
              ${INCLUDE_ARG}
            echo "Created: $TARBALL"
          done
        shell: bash
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release upload "$TAG" go-ffi-release/*.tar.gz --clobber --repo ${{ github.repository }}
        shell: bash

  upload-elixir-nifs:
    name: Upload Elixir NIF assets
    needs: [prepare, build-elixir-nifs]
    if: always() && needs.prepare.outputs.release_elixir == 'true' && needs.build-elixir-nifs.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || gh release create "$TAG" --draft --repo "${{ github.repository }}" --title "$TAG"
        shell: bash
      - uses: actions/download-artifact@v7
        with:
          pattern: elixir-nifs-*
          path: elixir-nifs
          merge-multiple: true
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release upload "$TAG" elixir-nifs/*.tar.gz --clobber --repo ${{ github.repository }}
        shell: bash

  upload-php-extensions:
    name: Upload PHP extension assets
    needs: [prepare, build-php]
    if: always() && needs.prepare.outputs.release_php == 'true' && needs.build-php.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || gh release create "$TAG" --draft --repo "${{ github.repository }}" --title "$TAG"
        shell: bash
      - uses: actions/download-artifact@v7
        with:
          pattern: php-pie-*
          path: php-pie-artifacts
          merge-multiple: true
      - name: List PHP artifacts
        run: ls -lah php-pie-artifacts/
        shell: bash
      - name: Upload PIE packages to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          echo "Uploading PHP PIE packages to GitHub release ${TAG}..."
          for file in php-pie-artifacts/liter-llm-*.tar.gz*; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              gh release upload "$TAG" "$file" --clobber --repo ${{ github.repository }}
            fi
          done
        shell: bash

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 6 — Publish jobs (conditional on check + build results)
  # ─────────────────────────────────────────────────────────────────────────

  publish-crates:
    name: Publish crates.io
    needs: [prepare, validate-versions, check-cratesio]
    if: |
      always() &&
      needs.prepare.outputs.release_crates == 'true' &&
      needs.validate-versions.result == 'success' &&
      (needs.check-cratesio.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - uses: kreuzberg-dev/actions/publish-crates@v1
        with:
          crates: liter-llm liter-llm-bindings-core liter-llm-ffi
          version: ${{ needs.prepare.outputs.version }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-pypi:
    name: Publish PyPI
    needs: [prepare, validate-versions, check-pypi, build-python-wheels, build-python-sdist]
    if: |
      always() &&
      needs.prepare.outputs.release_python == 'true' &&
      needs.validate-versions.result == 'success' &&
      needs.build-python-wheels.result == 'success' &&
      needs.build-python-sdist.result == 'success' &&
      (needs.check-pypi.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/liter-llm
    steps:
      - name: Re-check PyPI before publishing
        uses: kreuzberg-dev/actions/check-registry@v1
        id: recheck
        with:
          registry: pypi
          package: liter-llm
          version: ${{ needs.prepare.outputs.version }}
      - name: Download all wheel + sdist artifacts
        if: needs.prepare.outputs.dry_run != 'true' && (steps.recheck.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
        uses: actions/download-artifact@v7
        with:
          pattern: python-*
          path: dist
          merge-multiple: true
      - name: List packages to publish
        if: needs.prepare.outputs.dry_run != 'true' && (steps.recheck.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
        run: |
          echo "Packages in dist:"
          ls -lh dist/ 2>/dev/null || echo "No packages found"
        shell: bash
      - name: Publish to PyPI
        if: needs.prepare.outputs.dry_run != 'true' && (steps.recheck.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-node:
    name: Publish Node packages
    needs: [prepare, validate-versions, check-npm, build-node-native]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.prepare.outputs.release_node == 'true' &&
      needs.validate-versions.result == 'success' &&
      needs.check-npm.outputs.exists != 'true' &&
      needs.build-node-native.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: package.json

      - name: Download Node artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: node-native-*
          path: crates/liter-llm-node/artifacts
          merge-multiple: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Update NPM
        run: npm install -g npm
        shell: bash

      - name: Install @napi-rs/cli
        run: npm install -g @napi-rs/cli
        shell: bash

      - name: Assemble NAPI platform packages
        run: |
          napi artifacts --output-dir artifacts --npm-dir npm
        working-directory: crates/liter-llm-node
        shell: bash

      - name: Node artifacts summary
        if: ${{ needs.prepare.outputs.dry_run == 'true' }}
        run: (echo "Dry run requested; Node binding tarballs staged:" && find crates/liter-llm-node/artifacts -name '*.node' -print) >> "$GITHUB_STEP_SUMMARY"

      - name: Install workspace dependencies
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        run: pnpm install -C crates/liter-llm-node

      - name: Pack platform packages
        run: |
          for pkg_dir in crates/liter-llm-node/npm/*/; do
            echo "Packing $pkg_dir..."
            (cd "$pkg_dir" && npm pack && mv ./*.tgz ..)
          done

      - name: Re-check npm before publish
        id: recheck
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: npm
          package: "@kreuzberg/liter-llm-native"
          version: ${{ needs.prepare.outputs.version }}

      - name: Publish native binary packages
        if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-npm@v1
        with:
          packages-dir: crates/liter-llm-node/npm
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for npm indexing (x64)
        if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/wait-for-package@v1
        with:
          registry: npm
          package: "@kreuzberg/liter-llm-native-linux-x64-gnu"
          version: ${{ needs.prepare.outputs.version }}
          max-attempts: "25"

      - name: Wait for npm indexing (ARM64)
        if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/wait-for-package@v1
        with:
          registry: npm
          package: "@kreuzberg/liter-llm-native-linux-arm64-gnu"
          version: ${{ needs.prepare.outputs.version }}
          max-attempts: "25"

      - name: Publish main Node package
        if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-npm@v1
        with:
          package-dir: crates/liter-llm-node
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          provenance: "true"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for @kreuzberg/liter-llm-native to be available
        if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/wait-for-package@v1
        with:
          registry: npm
          package: "@kreuzberg/liter-llm-native"
          version: ${{ needs.prepare.outputs.version }}
          max-attempts: "25"

      - name: Build and publish @kreuzberg/liter-llm (TypeScript)
        if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.recheck.outputs.exists != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ needs.prepare.outputs.npm_tag }}
        run: |
          pnpm install
          pnpm --filter @kreuzberg/liter-llm build
          npm publish --tag "$NPM_TAG" --access public --provenance
        working-directory: packages/typescript
        shell: bash

      - name: npm already published summary
        if: ${{ steps.recheck.outputs.exists == 'true' }}
        run: echo "Node package @kreuzberg/liter-llm-native@${{ needs.prepare.outputs.version }} already published on npm — skipped." >> "$GITHUB_STEP_SUMMARY"

  publish-wasm:
    name: Publish WASM package
    needs: [prepare, validate-versions, check-npm-wasm, build-wasm, publish-node]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.prepare.outputs.release_wasm == 'true' &&
      needs.validate-versions.result == 'success' &&
      needs.check-npm-wasm.outputs.exists != 'true' &&
      needs.build-wasm.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 30
    steps:
      - name: Download WASM artifact
        uses: actions/download-artifact@v7
        with:
          name: wasm-pkg
          path: dist

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Check if version already published to npm
        id: npm_check
        run: |
          VERSION=$(jq -r '.version' dist/package.json)
          STATUS=$(npm view "@kreuzberg/liter-llm-wasm@${VERSION}" version 2>/dev/null || echo "")
          if [ "$STATUS" = "$VERSION" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Publish to npm
        if: ${{ steps.npm_check.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-npm@v1
        with:
          package-dir: dist
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          provenance: "true"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for npm indexing
        if: ${{ steps.npm_check.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/wait-for-package@v1
        with:
          registry: npm
          package: "@kreuzberg/liter-llm-wasm"
          version: ${{ needs.prepare.outputs.version }}
          max-attempts: "25"

      - name: Publish summary
        run: |
          if [ "${{ steps.npm_check.outputs.exists }}" = "true" ]; then
            echo "WASM package @kreuzberg/liter-llm-wasm@${{ needs.prepare.outputs.version }} already published on npm — skipped." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Published @kreuzberg/liter-llm-wasm@${{ needs.prepare.outputs.version }} to npm." >> "$GITHUB_STEP_SUMMARY"
          fi

  publish-rubygems:
    name: Publish RubyGems
    needs: [prepare, validate-versions, check-rubygems, build-ruby-gem]
    if: |
      always() &&
      needs.prepare.outputs.release_ruby == 'true' &&
      needs.validate-versions.result == 'success' &&
      needs.build-ruby-gem.result == 'success' &&
      (needs.check-rubygems.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Download Ruby gem artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: rubygems-*
          path: dist
          merge-multiple: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler: none
          bundler-cache: false

      - name: Install Bundler
        shell: bash
        run: (gem install bundler -v 4.0.0 --no-document || gem install bundler --no-document) && bundler --version

      - name: Install Ruby dependencies
        shell: bash
        run: scripts/ci/ruby/install-ruby-deps.sh packages/ruby

      - name: Vendor liter-llm core crate
        shell: bash
        run: python3 scripts/ci/ruby/vendor-liter-llm-core.py

      - name: Build source gem (fallback for unsupported platforms)
        shell: bash
        working-directory: packages/ruby
        run: |
          bundle config set --local path vendor/bundle
          bundle check || bundle install
          bundle exec rake build

      - name: Copy source gem to dist directory
        shell: bash
        run: |
          mkdir -p dist
          cp packages/ruby/pkg/*.gem dist/

      - name: List all gems for publishing
        shell: bash
        working-directory: dist
        run: |
          echo "=== All gems to publish ==="
          ls -lh liter_llm-*.gem
          echo ""
          gem_count=$(find . -maxdepth 1 -name 'liter_llm-*.gem' -print | wc -l)
          echo "Total gems: $gem_count"
          echo ""
          echo "Expected:"
          echo "  - Source gem: liter_llm-VERSION.gem"
          echo "  - Linux x86_64: liter_llm-VERSION-x86_64-linux.gem"
          echo "  - Linux ARM64: liter_llm-VERSION-aarch64-linux.gem"
          echo "  - macOS ARM64: liter_llm-VERSION-arm64-darwin.gem"
          if [ "$gem_count" -lt 2 ]; then
            echo "WARNING: Expected at least 2 gems (source + platform), found $gem_count" >&2
          fi

      - name: Re-check RubyGems before publish
        id: recheck
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: rubygems
          package: liter_llm
          version: ${{ needs.prepare.outputs.version }}

      - name: Configure trusted publishing credentials
        if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.recheck.outputs.exists != 'true' }}
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Publish gems to RubyGems
        if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-rubygems@v1
        with:
          gems-dir: dist
          dry-run: ${{ needs.prepare.outputs.dry_run }}

      - name: RubyGems already published summary
        if: ${{ steps.recheck.outputs.exists == 'true' }}
        run: echo "Gem liter_llm@${{ needs.prepare.outputs.version }} already published on RubyGems — skipped." >> "$GITHUB_STEP_SUMMARY"

  publish-maven:
    name: Publish Maven Central
    needs: [prepare, validate-versions, check-maven, build-java-package]
    if: |
      always() &&
      needs.prepare.outputs.release_java == 'true' &&
      needs.validate-versions.result == 'success' &&
      needs.build-java-package.result == 'success' &&
      (needs.check-maven.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: actions/download-artifact@v7
        with:
          name: maven-packages
          path: packages/java/target
      - name: Patch legacy Maven GPG arguments
        run: scripts/publish/patch-maven-gpg-args.sh packages/java/pom.xml
        shell: bash
      - name: Setup Java
        id: setup-java
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Setup Maven 3.9.11
        uses: kreuzberg-dev/actions/setup-maven@v1
      - name: Prefer gpg2 binary
        run: scripts/publish/prefer-gpg2-binary.sh
        shell: bash
      - name: Release Maven package
        uses: kreuzberg-dev/actions/publish-maven@v1
        with:
          pom-file: packages/java/pom.xml
          maven-profile: publish
          extra-args: -DskipTests
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  publish-hex:
    name: Publish Hex.pm
    needs: [prepare, validate-versions, check-hex, publish-crates, build-elixir-nifs, upload-elixir-nifs]
    if: |
      always() &&
      needs.prepare.outputs.release_elixir == 'true' &&
      needs.validate-versions.result == 'success' &&
      needs.upload-elixir-nifs.result == 'success' &&
      (needs.check-hex.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    environment: hex
    permissions:
      contents: write
      id-token: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Generate checksums from GitHub release
        run: ./scripts/publish/generate_elixir_checksums.sh "${{ needs.prepare.outputs.version }}"
        shell: bash

      - name: Commit updated checksum file to main
        if: needs.prepare.outputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/elixir/checksum-Elixir.LiterLlm.Native.exs
          if git diff --cached --quiet; then
            echo "No checksum changes to commit"
          else
            git commit -m "chore: update Elixir NIF checksums for v${{ needs.prepare.outputs.version }}"
            git push origin HEAD:refs/heads/main || echo "Push failed (non-critical)"
          fi
        shell: bash

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Install Mix dependencies
        run: mix local.hex --force && mix local.rebar --force && mix deps.get
        working-directory: packages/elixir
        shell: bash

      - uses: kreuzberg-dev/actions/publish-hex@v1
        with:
          package-dir: packages/elixir
          skip-docs: "true"
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

  publish-nuget:
    name: Publish NuGet
    needs: [prepare, validate-versions, check-nuget, build-csharp-package]
    if: |
      always() &&
      needs.prepare.outputs.release_csharp == 'true' &&
      needs.validate-versions.result == 'success' &&
      needs.build-csharp-package.result == 'success' &&
      (needs.check-nuget.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: nuget-packages
          path: nuget-output
      - uses: kreuzberg-dev/actions/publish-nuget@v1
        with:
          packages-dir: nuget-output
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  publish-packagist:
    name: Publish Packagist
    needs: [prepare, validate-versions, check-packagist, upload-php-extensions]
    if: |
      always() &&
      needs.prepare.outputs.release_php == 'true' &&
      needs.upload-php-extensions.result == 'success' &&
      needs.validate-versions.result == 'success' &&
      (needs.check-packagist.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    timeout-minutes: 15
    steps:
      - uses: kreuzberg-dev/actions/publish-packagist@v1
        with:
          packagist-username: kreuzberg
          package-name: kreuzberg/liter-llm
          version: ${{ needs.prepare.outputs.version }}
          repository-url: https://github.com/kreuzberg-dev/liter-llm
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 7 — Finalize
  # ─────────────────────────────────────────────────────────────────────────
  release-finalize:
    name: Finalize release
    needs:
      - prepare
      - upload-go-ffi
      - upload-php-extensions
      - publish-crates
      - publish-pypi
      - publish-node
      - publish-wasm
      - publish-rubygems
      - publish-maven
      - publish-hex
      - publish-nuget
      - publish-packagist
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Create Go module tag
        if: needs.prepare.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          GO_TAG="packages/go/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$GO_TAG" || echo "Tag $GO_TAG already exists, skipping"
          git push origin "$GO_TAG" || echo "Tag push skipped"
        shell: bash

      - name: Undraft GitHub Release
        if: needs.prepare.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release edit "$TAG" --draft=false
        shell: bash

      - name: Publish summary
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          {
            echo "## Release v${VERSION}"
            echo ""
            echo "| Registry | Status |"
            echo "|----------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"
          report() {
            local name="$1" result="$2"
            case "$result" in
              success)  echo "| $name | ✅ Published |" ;;
              skipped)  echo "| $name | ⏭️ Skipped |" ;;
              *)        echo "| $name | ❌ $result |" ;;
            esac
          }
          {
            report "crates.io"   "${{ needs.publish-crates.result }}"
            report "PyPI"        "${{ needs.publish-pypi.result }}"
            report "npm"         "${{ needs.publish-node.result }}"
            report "npm (WASM)"  "${{ needs.publish-wasm.result }}"
            report "RubyGems"    "${{ needs.publish-rubygems.result }}"
            report "Maven"       "${{ needs.publish-maven.result }}"
            report "Hex.pm"      "${{ needs.publish-hex.result }}"
            report "NuGet"       "${{ needs.publish-nuget.result }}"
            report "Packagist"   "${{ needs.publish-packagist.result }}"
            report "Go FFI"      "${{ needs.upload-go-ffi.result }}"
            report "PHP ext"     "${{ needs.upload-php-extensions.result }}"
          } >> "$GITHUB_STEP_SUMMARY"
        shell: bash
