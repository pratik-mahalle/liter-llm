name: CI Docker Build & Test

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-docker.yaml'
      - 'crates/liter-llm/**'
      - 'crates/liter-llm-proxy/**'
      - 'crates/liter-llm-cli/**'
      - 'docker/**'
      - '.dockerignore'
      - 'scripts/ci/docker/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci-docker.yaml'
      - 'crates/liter-llm/**'
      - 'crates/liter-llm-proxy/**'
      - 'crates/liter-llm-cli/**'
      - 'docker/**'
      - '.dockerignore'
      - 'scripts/ci/docker/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip API contract tests (build only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-docker:
    name: Build and Test Docker Image
    if: github.repository == 'kreuzberg-dev/liter-llm' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: liter-llm:test
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=ci-docker

      - name: Run Docker integration tests
        run: python3 scripts/ci/docker/test_docker.py --image liter-llm:test --port 14000

      - name: Schemathesis API contract tests
        if: ${{ !inputs.skip_tests }}
        run: |
          pip3 install schemathesis

          container_id=$(docker run -d -p 14001:4000 \
            -e LITER_LLM_MASTER_KEY=sk-schema-test \
            liter-llm:test)
          sleep 3

          FAILED=0
          schemathesis run http://localhost:14001/openapi.json \
            --max-examples=10 \
            --request-timeout=30000 \
            --header "Authorization: Bearer sk-schema-test" \
            --checks status_code_conformance,response_schema_conformance,negative_data_rejection || FAILED=1

          docker stop "$container_id"
          exit $FAILED

      - name: Check image size
        run: |
          size_mb=$(docker inspect liter-llm:test --format='{{.Size}}' | awk '{print int($1/1024/1024)}')
          echo "Image size: ${size_mb}MB"
          if [ "$size_mb" -gt 100 ]; then
            echo "::warning::Docker image is larger than 100MB (${size_mb}MB)"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-test-results
          path: /tmp/liter-llm-docker-test-results.json
          retention-days: 7

      - name: Save image artifact
        if: failure()
        run: docker save liter-llm:test | gzip > liter-llm-test.tar.gz

      - name: Upload image artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-test
          path: liter-llm-test.tar.gz
          retention-days: 3
