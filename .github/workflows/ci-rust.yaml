name: CI Rust

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - crates/**
      - Cargo.toml
      - Cargo.lock
      - rustfmt.toml
      - .task/**
      - Taskfile.yml
      - .github/workflows/ci-rust.yaml
  pull_request:
    branches: [main]
    paths:
      - crates/**
      - Cargo.toml
      - Cargo.lock
      - rustfmt.toml
      - .task/**
      - Taskfile.yml
      - .github/workflows/ci-rust.yaml

permissions:
  contents: read

concurrency:
  group: ci-rust-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    timeout-minutes: 60
    services: ${{ matrix.os == 'ubuntu-latest' && fromJSON('{"redis":{"image":"redis:7-alpine","ports":["6379:6379"],"options":"--health-cmd \"redis-cli ping\" --health-interval 5s --health-timeout 3s --health-retries 5"}}') || fromJSON('{}') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.46.4

      - name: Run Rust Tests
        env:
          RUST_BACKTRACE: full
        run: task rust:test
        shell: bash

      - name: Run Integration Tests (with ignored)
        if: matrix.os == 'ubuntu-latest'
        env:
          RUST_BACKTRACE: full
        run: >
          cargo test -p liter-llm --features full
          -- --include-ignored --skip live_device_flow
        shell: bash

      - name: Check Rust Formatting
        if: matrix.os == 'ubuntu-latest'
        run: task rust:format:check
        shell: bash

      - name: Run Clippy
        if: matrix.os == 'ubuntu-latest'
        run: task rust:lint:check
        shell: bash
