version: "3"

includes:
  _cfg:
    taskfile: .task/config/vars.yml
    internal: true
  _platforms:
    taskfile: .task/config/platforms.yml
    internal: true
  rust:
    taskfile: .task/languages/rust.yml
  python:
    taskfile: .task/languages/python.yml
  node:
    taskfile: .task/languages/node.yml
  go:
    taskfile: .task/languages/go.yml
  java:
    taskfile: .task/languages/java.yml
  elixir:
    taskfile: .task/languages/elixir.yml
  c:
    taskfile: .task/languages/c.yml
  ruby:
    taskfile: .task/languages/ruby.yml
  wasm:
    taskfile: .task/languages/wasm.yml
  php:
    taskfile: .task/languages/php.yml
  csharp:
    taskfile: .task/languages/csharp.yml
  _build_wf:
    taskfile: .task/workflows/build.yml
    internal: true
  _test_wf:
    taskfile: .task/workflows/test.yml
    internal: true
  _lint_wf:
    taskfile: .task/workflows/lint.yml
    internal: true
  _e2e_wf:
    taskfile: .task/workflows/e2e.yml
    internal: true
  version:
    taskfile: .task/tools/version-sync.yml
  tools:
    taskfile: .task/tools/general.yml
  test-apps:
    taskfile: .task/tools/test-apps.yml

vars:
  PROJECT_ROOT:
    sh: pwd
  VERSION:
    sh: python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml','rb'))['workspace']['package']['version'])"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  setup:
    desc: "Install all dependencies and initialize project. Idempotent - safe to re-run anytime."
    cmds:
      - task: _platforms:setup:sdkman
      - echo "Installing language tools..."
      - task: rust:install
      - task: python:install
      - task: node:install
      - task: ruby:install
      - task: java:install
      - task: go:install
      - task: elixir:install
      - task: csharp:install
      - task: php:install
      - task: c:install
      - echo "Installing pre-commit hooks..."
      - prek install
      - prek install --hook-type commit-msg
      - echo "Generating AI rules..."
      - task: tools:ai-rulez
      - echo "Setup complete - safe to re-run anytime"

  ai-rulez:
    desc: Generate ai-rulez configuration files (CLAUDE.md, etc.)
    cmds:
      - task: tools:ai-rulez

  build:
    desc: Build core libraries and language bindings
    cmds:
      - task: rust:build

  build:release:
    desc: Build in release mode (optimized)
    cmds:
      - task: rust:build:release

  test:
    desc: Run Rust tests
    cmds:
      - task: rust:test

  lint:
    desc: Run all linters and formatters via prek (pre-commit framework)
    cmds:
      - prek run --all-files

  check:
    desc: Run all checks (lint + test)
    cmds:
      - task: lint
      - task: test

  format:
    desc: Format all code
    cmds:
      - task: rust:format
      - task: python:format
      - task: node:format
      - task: ruby:format
      - task: go:format
      - task: java:format
      - task: csharp:format
      - task: php:format
      - task: elixir:format

  update:
    desc: Update all dependencies to latest versions
    cmds:
      - echo "Updating Rust dependencies..."
      - task: rust:update
      - echo "Updating Python dependencies..."
      - task: python:update
      - echo "Updating TypeScript dependencies..."
      - task: node:update
      - echo "Updating Ruby dependencies..."
      - task: ruby:update
      - echo "Updating Go dependencies..."
      - task: go:update
      - echo "Updating Java dependencies..."
      - task: java:update
      - echo "Updating Elixir dependencies..."
      - task: elixir:update
      - echo "Updating WASM tools..."
      - task: wasm:update
      - echo "Updating PHP dependencies..."
      - task: php:update
      - echo "Updating C# dependencies..."
      - task: csharp:update
      - echo "Updating prek dependencies..."
      - prek autoupdate
      - echo "All dependencies updated"

  clean:
    desc: Clean all build artifacts
    cmds:
      - task: rust:clean
      - task: python:clean
      - task: node:clean
      - task: ruby:clean
      - task: go:clean
      - task: java:clean
      - task: csharp:clean
      - task: php:clean
      - task: wasm:clean
      - task: elixir:clean

  # Codegen (run after schema changes)
  # TODO: generate:types — requires e2e-generator `types` subcommand (not yet implemented)
  # TODO: generate:providers — requires e2e-generator `providers` subcommand (not yet implemented)
  # TODO: generate:check — requires e2e-generator `check` subcommand (not yet implemented)

  generate:all:
    desc: Regenerate all code from schemas
    cmds:
      - task: e2e:generate:all

  # E2E test generation (delegates to e2e workflow)
  e2e:generate:all:
    desc: Generate E2E tests for all languages from fixtures
    cmds:
      - task: e2e:generate:all

  e2e:generate:rust:
    desc: Generate and format Rust E2E tests
    cmds:
      - task: e2e:generate:rust

  e2e:generate:python:
    desc: Generate and lint Python E2E tests
    cmds:
      - task: e2e:generate:python

  e2e:generate:typescript:
    desc: Generate TypeScript E2E tests
    cmds:
      - task: e2e:generate:typescript

  e2e:generate:go:
    desc: Generate and format Go E2E tests
    cmds:
      - task: e2e:generate:go

  e2e:generate:java:
    desc: Generate Java E2E tests
    cmds:
      - task: e2e:generate:java

  e2e:generate:elixir:
    desc: Generate Elixir E2E tests
    cmds:
      - task: e2e:generate:elixir

  e2e:generate:ruby:
    desc: Generate and format Ruby E2E tests
    cmds:
      - task: e2e:generate:ruby

  e2e:generate:wasm:
    desc: Generate WASM E2E tests
    cmds:
      - task: e2e:generate:wasm

  e2e:generate:c:
    desc: Generate C E2E tests
    cmds:
      - task: e2e:generate:c

  e2e:generate:php:
    desc: Generate PHP E2E tests
    cmds:
      - task: e2e:generate:php

  e2e:generate:csharp:
    desc: Generate C# E2E tests
    cmds:
      - task: e2e:generate:csharp

  e2e:test:rust:
    desc: Run Rust E2E tests (generate + format + test)
    cmds:
      - task: rust:e2e:generate
      - cargo test --manifest-path e2e/rust/Cargo.toml
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
