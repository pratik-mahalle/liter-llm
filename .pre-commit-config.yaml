default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^e2e/|vendor/|node_modules/|target/|parsers/|crates/.*/deps/|crates/.*/tmp/|_build/

repos:
  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
        exclude: Cargo.lock
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.20.0"
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/DevinR528/cargo-sort
    rev: "v2.1.3"
    hooks:
      - id: cargo-sort
        args: [-w]

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
        exclude: "pyproject.toml|Cargo.toml"

  # Python: ruff (linting + formatting) + mypy (type checking)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: ["--fix", "--unsafe-fixes"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        exclude: "e2e/|scripts/|tests/|crates/"

  # Rust: formatting and linting
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 0.5.0
    hooks:
      - id: cargo-fmt
        args: ["--all"]
      - id: cargo-clippy
        args:
          [
            "--fix",
            "--allow-dirty",
            "--allow-staged",
            "--workspace",
            "--exclude",
            "liter-lm-ruby",
            "--exclude",
            "liter-lm-php",
            "--exclude",
            "liter-lm-wasm",
            "--all-targets",
            "--",
            "-D",
            "warnings",
          ]

  - repo: https://github.com/bnjbvr/cargo-machete
    rev: v0.9.1
    hooks:
      - id: cargo-machete

  - repo: https://github.com/EmbarkStudios/cargo-deny
    rev: 0.19.0
    hooks:
      - id: cargo-deny
        args: ["check"]

  # Shell scripts: formatting and linting
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.0-1
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2"]

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint

  # Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint-fix
        exclude: "^.ai-rulez/"

  # AI Rules
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v3.10.0
    hooks:
      - id: ai-rulez-generate

  # JavaScript/TypeScript/JSON: biome (formatting + linting)
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.8
    hooks:
      - id: biome-format
      - id: biome-lint

  - repo: https://github.com/oxc-project/mirrors-oxlint
    rev: v1.57.0
    hooks:
      - id: oxlint
        args: ["--fix"]

  # C/C++: formatting and linting (FFI code)
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-format
        args: [--style=file]
        files: (^crates/liter-lm-ffi/)
        exclude: (include/)
      - id: cppcheck
        args:
          [
            "--std=c11",
            "--enable=warning,style,performance",
            "--suppress=missingIncludeSystem",
          ]
        files: (^crates/liter-lm-ffi/)

  # Go: formatting and linting via Taskfile
  - repo: local
    hooks:
      - id: golangci-lint-full
        name: golangci-lint (all Go modules)
        entry: task go:lint
        language: system
        files: \.go$
        pass_filenames: false

  # Local hooks for languages without native pre-commit support
  - repo: local
    hooks:
      # Ruby - rubocop formatting and linting
      - id: ruby-format
        name: Ruby formatting (rubocop)
        entry: task ruby:format
        language: system
        files: \.rb$
        pass_filenames: false
        require_serial: true

      - id: ruby-lint
        name: Ruby linting (rubocop)
        entry: task ruby:lint
        language: system
        files: \.(rb|rbs)$
        pass_filenames: false
        require_serial: true

      - id: rbs-validate
        name: RBS type signature validation
        entry: task ruby:rbs-validate
        language: system
        files: \.(rb|rbs)$
        pass_filenames: false
        require_serial: true

      - id: ruby-typecheck
        name: Ruby type checking (steep)
        entry: task ruby:typecheck
        language: system
        files: \.(rb|rbs)$
        pass_filenames: false
        require_serial: true

      # Java - formatting and linting
      - id: java-format
        name: Java formatting (google-java-format)
        entry: task java:format
        language: system
        files: \.java$
        pass_filenames: false
        require_serial: true

      - id: java-lint
        name: Java linting
        entry: task java:lint
        language: system
        files: \.java$
        pass_filenames: false
        require_serial: true

      # C# - dotnet format
      - id: csharp-format
        name: C# formatting (dotnet format)
        entry: task csharp:format
        language: system
        files: \.cs$
        pass_filenames: false
        require_serial: true

      # Elixir - mix format and credo
      - id: elixir-format
        name: Elixir formatting (mix format)
        entry: task elixir:format
        language: system
        files: \.(ex|exs)$
        pass_filenames: false
        require_serial: true

      - id: elixir-lint
        name: Elixir linting (mix credo)
        entry: "bash -c 'task elixir:lint 2>&1 || echo WARN - Elixir lint skipped'"
        language: system
        files: \.(ex|exs)$
        pass_filenames: false
        require_serial: true

  # Spelling
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        exclude: ^tests|^parsers|^vendors|^target|^e2e|^\.ai-rulez|pnpm-lock\.yaml|docs/css/|sources
        additional_dependencies:
          - tomli
